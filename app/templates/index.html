{% extends "base.html" %}

{% block content %}
<div class="page-header">
    <h1>My Tasks</h1>
    <p>Keep track of everything you need to do.</p>
</div>

<!-- Add Task Form -->
<div class="form-card">
    <h3>New Task</h3>
    <form hx-post="/tasks/"
          hx-target="#task-list"
          hx-swap="innerHTML"
          hx-on::after-request="this.reset()">
        <div class="form-row">
            <div class="form-inputs">
                <input type="text" name="title" placeholder="What needs to be done?" required>
                <textarea name="description" placeholder="Add a description (optional)" rows="2"></textarea>
            </div>
            <button type="submit" class="btn-add">+ Add Task</button>
        </div>
    </form>
</div>

<!-- Task List -->
<div class="task-list-header">Tasks</div>
<div id="task-list"
     hx-get="/tasks/html"
     hx-trigger="load">
</div>
{% endblock %}
